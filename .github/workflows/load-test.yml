name: Load & Performance Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *' # Run daily at 2 AM

jobs:
  performance-scan:
    name: Scalability Load Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Load Testing Suite (310+ Cases)
      run: npm run test:load
      env:
        CI: true

    - name: Upload Load Test Excel Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: load-test-report
        path: tests/e2e/artifacts/TaskLance_Load_Test_Report.xlsx
        retention-days: 14
